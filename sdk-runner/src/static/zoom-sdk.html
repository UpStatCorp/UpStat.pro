<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom AI Agent</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .status.connected {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        .status.disconnected {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        .meeting-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            backdrop-filter: blur(10px);
        }
        
        .participants {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }
        
        .participant {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .ai-assistant {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            font-weight: bold;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .greeting {
            font-size: 18px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .logo {
            font-size: 24px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🤖 AI Agent</div>
        
        <div id="status" class="status disconnected">
            <h3>Статус подключения</h3>
            <p id="statusText">Отключено</p>
        </div>
        
        <div class="meeting-info">
            <h4>Информация о встрече</h4>
            <p>ID встречи: <span id="meetingId">-</span></p>
            <p>Имя агента: <span id="userName">-</span></p>
        </div>
        
        <div class="participants" id="participants">
            <!-- Участники будут добавлены динамически -->
        </div>
        
        <div class="greeting" id="greeting" style="display: none;">
            🎤 "Привет, друг!"
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" id="joinBtn" onclick="joinMeeting()">Присоединиться</button>
            <button class="btn btn-danger" id="leaveBtn" onclick="leaveMeeting()" style="display: none;">Покинуть</button>
        </div>
    </div>

    <!-- Zoom Meeting SDK -->
    <script src="https://source.zoom.us/2.18.0/lib/vendor/react.min.js"></script>
    <script src="https://source.zoom.us/2.18.0/lib/vendor/react-dom.min.js"></script>
    <script src="https://source.zoom.us/2.18.0/lib/vendor/redux.min.js"></script>
    <script src="https://source.zoom.us/2.18.0/lib/vendor/redux-thunk.min.js"></script>
    <script src="https://source.zoom.us/2.18.0/zoom-meeting-2.18.0.min.js"></script>

    <script>
        let meetingSDKElement;
        let client;
        let meetingNumber;
        let userName;
        let signature;
        let sdkKey;
        
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        meetingNumber = urlParams.get('meetingNumber');
        userName = urlParams.get('userName') || 'AI Assistant';
        signature = urlParams.get('signature');
        sdkKey = urlParams.get('sdkKey');
        
        // Обновляем UI
        document.getElementById('meetingId').textContent = meetingNumber || '-';
        document.getElementById('userName').textContent = userName;
        
        function updateStatus(status, text) {
            const statusEl = document.getElementById('status');
            const statusTextEl = document.getElementById('statusText');
            
            statusEl.className = `status ${status}`;
            statusTextEl.textContent = text;
        }
        
        function addParticipant(name, isAI = false) {
            const participantsEl = document.getElementById('participants');
            const participantEl = document.createElement('div');
            participantEl.className = `participant ${isAI ? 'ai-assistant' : ''}`;
            participantEl.textContent = name;
            participantsEl.appendChild(participantEl);
        }
        
        function showGreeting() {
            const greetingEl = document.getElementById('greeting');
            greetingEl.style.display = 'block';
            
            // Бесконечно повторяем приветствие
            setInterval(() => {
                greetingEl.style.display = 'block';
                setTimeout(() => {
                    greetingEl.style.display = 'none';
                }, 2000);
            }, 5000);
        }
        
        async function joinMeeting() {
            if (!meetingNumber || !signature || !sdkKey) {
                alert('Отсутствуют необходимые параметры для подключения');
                return;
            }
            
            try {
                updateStatus('connecting', 'Подключение...');
                
                // Создаем элемент для Zoom SDK
                meetingSDKElement = document.createElement('div');
                meetingSDKElement.id = 'meetingSDKElement';
                meetingSDKElement.style.position = 'fixed';
                meetingSDKElement.style.top = '0';
                meetingSDKElement.style.left = '0';
                meetingSDKElement.style.width = '100%';
                meetingSDKElement.style.height = '100%';
                meetingSDKElement.style.zIndex = '1000';
                document.body.appendChild(meetingSDKElement);
                
                // Инициализируем Zoom Meeting SDK
                client = ZoomMtgEmbedded.createClient();
                
                // Настраиваем обработчики событий
                client.on('connection-change', (data) => {
                    console.log('Connection change:', data);
                    if (data.state === 'Connected') {
                        updateStatus('connected', 'Подключено');
                        document.getElementById('joinBtn').style.display = 'none';
                        document.getElementById('leaveBtn').style.display = 'inline-block';
                        addParticipant(userName, true);
                        showGreeting();
                    }
                });
                
                client.on('participant-joined', (data) => {
                    console.log('Participant joined:', data);
                    addParticipant(data.participantName || 'Участник');
                });
                
                client.on('participant-left', (data) => {
                    console.log('Participant left:', data);
                });
                
                client.on('meeting-state-change', (data) => {
                    console.log('Meeting state change:', data);
                });
                
                // Присоединяемся к встрече
                await client.join({
                    sdkKey: sdkKey,
                    signature: signature,
                    meetingNumber: meetingNumber,
                    userName: userName,
                    password: '', // если есть пароль
                    role: 0 // 0 = attendee, 1 = host
                });
                
            } catch (error) {
                console.error('Ошибка подключения:', error);
                updateStatus('disconnected', 'Ошибка подключения');
                alert('Ошибка подключения к встрече: ' + error.message);
            }
        }
        
        async function leaveMeeting() {
            try {
                if (client) {
                    await client.leaveMeeting();
                }
                
                if (meetingSDKElement) {
                    document.body.removeChild(meetingSDKElement);
                }
                
                updateStatus('disconnected', 'Отключено');
                document.getElementById('joinBtn').style.display = 'inline-block';
                document.getElementById('leaveBtn').style.display = 'none';
                document.getElementById('participants').innerHTML = '';
                document.getElementById('greeting').style.display = 'none';
                
            } catch (error) {
                console.error('Ошибка отключения:', error);
            }
        }
        
        // Автоматически присоединяемся при загрузке страницы
        window.addEventListener('load', () => {
            if (meetingNumber && signature && sdkKey) {
                setTimeout(joinMeeting, 1000);
            }
        });
    </script>
</body>
</html>
