

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-saas_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-saas_password}
      - POSTGRES_DB=${POSTGRES_DB:-saas}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas_user} -d ${POSTGRES_DB:-saas}"]
      interval: 10s
      timeout: 5s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - saas-network
    restart: unless-stopped
  # Основной FastAPI бэкенд
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CRM_ENCRYPTION_KEY=CBPi4cgDR3EZkOh2ZvN7eZ7jUXr43qYpY4jRKmvtF0g=
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - ELEVENLABS_MODEL_ID=${ELEVENLABS_MODEL_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_me_in_production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-https://up-stat.com/auth/google/callback}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-saas_user}:${POSTGRES_PASSWORD:-saas_password}@postgres:5432/${POSTGRES_DB:-saas}
      # Параметры стабильности голоса (Voice Assistant)
      - ELEVENLABS_STABILITY=${ELEVENLABS_STABILITY:-0.75}
      - ELEVENLABS_SIMILARITY_BOOST=${ELEVENLABS_SIMILARITY_BOOST:-0.8}
      - ELEVENLABS_STYLE=${ELEVENLABS_STYLE:-0.0}
      - ELEVENLABS_USE_SPEAKER_BOOST=${ELEVENLABS_USE_SPEAKER_BOOST:-true}
      - OPENAI_TTS_SPEED=${OPENAI_TTS_SPEED:-1.0}
      # Провайдеры и модели
      - STT_PROVIDER=${STT_PROVIDER:-whisper_openai}
      - TTS_PROVIDER=${TTS_PROVIDER:-elevenlabs}
      - TTS_MODEL=${TTS_MODEL:-tts-1}
      - TTS_VOICE=${TTS_VOICE:-nova}
      - GPT_MODEL=${GPT_MODEL:-gpt-4o-mini}
      - GPT_MAX_TOKENS=${GPT_MAX_TOKENS:-150}
      - GPT_TEMPERATURE=${GPT_TEMPERATURE:-0.7}
      # Azure Voice Live API
      - AZURE_VOICE_LIVE_ENDPOINT=${AZURE_VOICE_LIVE_ENDPOINT}
      - AZURE_VOICE_LIVE_API_KEY=${AZURE_VOICE_LIVE_API_KEY}
      - AZURE_VOICE_LIVE_MODEL=${AZURE_VOICE_LIVE_MODEL:-gpt-4o-realtime-preview}
      - AZURE_VOICE_LIVE_API_VERSION=${AZURE_VOICE_LIVE_API_VERSION:-2025-05-01-preview}
      - AZURE_VOICE_LIVE_VOICE=${AZURE_VOICE_LIVE_VOICE:-en-US-Ava:DragonHDLatestNeural}
      - AZURE_VOICE_LIVE_TRANSCRIPTION_MODEL=${AZURE_VOICE_LIVE_TRANSCRIPTION_MODEL:-gpt-4o-transcribe}
      - USE_AZURE_VOICE_LIVE=${USE_AZURE_VOICE_LIVE:-true}

      # CRM интеграции (AmoCRM + Bitrix24)
      - AMOCRM_CLIENT_ID=${AMOCRM_CLIENT_ID}
      - AMOCRM_CLIENT_SECRET=${AMOCRM_CLIENT_SECRET}
      - AMOCRM_REDIRECT_URI=${AMOCRM_REDIRECT_URI:-https://up-stat.com/crm/oauth/callback}
      - BITRIX24_CLIENT_ID=${BITRIX24_CLIENT_ID}
      - BITRIX24_CLIENT_SECRET=${BITRIX24_CLIENT_SECRET}
      - BITRIX24_REDIRECT_URI=${BITRIX24_REDIRECT_URI:-https://up-stat.com/crm/oauth/callback}

      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=dunawayctaylor81@gmail.com
      - SMTP_PASSWORD=cbagfxyuxhycltgc
      - SMTP_FROM_EMAIL=dunawayctaylor81@gmail.com
      - SMTP_FROM_NAME=UpStat
      - SMTP_USE_TLS=true
      - PUBLIC_APP_URL=http://localhost:8000
    volumes:
      - ./app:/app
      - ./voice_assistant:/app/voice_assistant
      - ./uploads:/app/uploads
      # SQLite база для миграции (если нужно)
      - ./app.db:/app/root_app.db
      - ./checklists:/app/checklists
      - ./checklists_trener:/app/checklists_trener
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - saas-network
    restart: unless-stopped

  # Redis для кэширования и очередей (опционально)
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - saas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3


  # Nginx для проксирования (опционально)
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - saas-network
    restart: unless-stopped

networks:
  saas-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
    external: true
    name: saas_ocenka-main_v36_postgres_data
  pgadmin_data:
